<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>養豬週記🐽</title>
<style>
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system;background:#fff9f9;margin:0;padding:16px;color:#222}
.card{background:white;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px #f0dce5}
h2{margin-top:4px;color:#c75d77}
.label{font-size:14px;color:#666;margin-top:8px}
input,select,button{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;margin-top:4px;font-size:16px}

input[type="date"] {
  width:100%!important;
  max-width:100%!important;
  box-sizing:border-box!important;
  appearance:none;
}

button{background:#f06d8a;color:white;font-weight:bold;border:none}
.gray-btn{background:#eee;color:#333}
.del-btn{background:#ff9f9f;color:#fff;border:0;border-radius:8px;padding:4px 8px;font-size:12px}
.split{display:flex;gap:8px}
.split input{flex:1}

.pay-row{display:flex;gap:8px;margin-top:4px}
.pay-btn{flex:1;padding:10px;border-radius:10px;border:1px solid #ddd;background:#f9f9f9;color:#333}
.pay-btn.active{background:#f06d8a;color:white}

/* 精簡版月份箭頭 */
.month-nav{display:flex;align-items:center;justify-content:center;gap:8px;margin:8px 0}
.month-arrow{
  background:#f06d8a;
  color:white;
  border:none;
  border-radius:8px;
  padding:6px 10px; /* 更小的內距 */
  font-size:14px;   /* 字體縮小 */
  width:auto;
  min-width:36px;
}
.month-text{font-size:17px;font-weight:600;color:#c75d77}

.total{font-size:17px;font-weight:600;margin:4px 0}
.highlight{color:#f06d8a}
.balance{font-size:18px;font-weight:700;color:#e05686}
.item{padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:15px;display:flex;justify-content:space-between;align-items:center}
.cat{color:#888;font-size:13px}
.gray{color:#555}
</style>
</head>
<body>

<div class="card">
  <h2>養豬週記🐽</h2>

  <div class="month-nav">
    <button class="month-arrow" onclick="prevMonth()">＜</button>
    <div id="monthLabel" class="month-text">2026-04</div>
    <button class="month-arrow" onclick="nextMonth()">＞</button>
  </div>

  <div class="total">本月預算：<span class="highlight">12,000</span> 元</div>
  <div class="total">該月花費：<span id="total" class="highlight">0</span> 元</div>
  <div class="total">該月剩餘：<span id="left" class="highlight">12000</span> 元</div>

  <div style="margin-top:12px;padding-top:12px;border-top:1px solid #f0dce5">
    <div class="balance">🎁 節日累積結餘：<span id="balanceTotal">0</span> 元</div>
    <div style="font-size:14px;color:#666">可保留到節日使用</div>
  </div>

  <div style="margin-top:12px;font-size:15px">
    <div class="gray">我總付：<span id="meTotal">0</span> 元</div>
    <div class="gray">他總付：<span id="heTotal">0</span> 元</div>
  </div>
</div>

<div class="card">
  <div class="label">日期</div>
  <input id="datePick" type="date">

  <div class="label">店家 / 內容</div>
  <input id="shop" placeholder="ex：清河鵝肉 / 龜記">

  <div class="label">分類</div>
  <select id="cate">
    <option value="早餐">早餐</option>
    <option value="午餐">午餐</option>
    <option value="晚餐">晚餐</option>
    <option value="水">水</option>
    <option value="飲料">飲料</option>
    <option value="加油">加油</option>
    <option value="其他">其他</option>
  </select>

  <div class="label">付款方式</div>
  <div class="pay-row">
    <button class="pay-btn active" data-type="oneMe">我全付</button>
    <button class="pay-btn" data-type="oneHe">他全付</button>
    <button class="pay-btn" data-type="split">兩人分攤</button>
  </div>

  <div id="singleArea" style="margin-top:12px">
    <div class="label">金額</div>
    <input id="singleAmt" type="number" placeholder="輸入金額">
  </div>

  <div id="splitArea" style="display:none;margin-top:12px">
    <div class="label">我出 / 他出</div>
    <div class="split">
      <input id="amtMe" placeholder="我出">
      <input id="amtHe" placeholder="他出">
    </div>
  </div>

  <button onclick="add()">新增記錄</button>
  <button class="gray-btn" onclick="exportCSV()" style="margin-top:8px">📤 匯出 CSV 備份</button>
  <button class="gray-btn" onclick="manualResetMonth()" style="margin-top:4px">🔄 換月結算（累積餘額）</button>
</div>

<div class="card">
  <h3>📝 記錄</h3>
  <div id="list"></div>
</div>

<script>
const STORAGE_KEY = "ourPigLog";
const BALANCE_KEY = "pigBalanceTotal";

let rawData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let balanceTotal = +localStorage.getItem(BALANCE_KEY) || 0;
let payType = "oneMe";

// 當前顯示年月
let currentView = new Date();

// 日期選擇後自動關閉
const datePick = document.getElementById("datePick");
datePick.valueAsDate = new Date();
datePick.addEventListener("change", () => {
  document.activeElement.blur();
});

// 月份翻頁
function updateMonthLabel() {
  const y = currentView.getFullYear();
  const m = String(currentView.getMonth() + 1).padStart(2, '0');
  document.getElementById("monthLabel").textContent = `${y}-${m}`;
  render();
}

function prevMonth() {
  currentView = new Date(currentView.getFullYear(), currentView.getMonth() - 1, 1);
  updateMonthLabel();
}

function nextMonth() {
  currentView = new Date(currentView.getFullYear(), currentView.getMonth() + 1, 1);
  updateMonthLabel();
}

// 取得當前檢視月份的 key
function getViewMonthKey() {
  const y = currentView.getFullYear();
  const m = currentView.getMonth() + 1;
  return `${y}-${String(m).padStart(2, '0')}`;
}

// 比對紀錄屬於哪個月
function getMonthKey(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

// 計算金額
function cal() {
  const m = getViewMonthKey();
  const list = rawData.filter(x => getMonthKey(x.date) === m);
  let total=0, me=0, he=0;
  list.forEach(x => { total+=x.me+x.he; me+=x.me; he+=x.he; });
  const left = 12000 - total;
  document.getElementById("total").textContent = total;
  document.getElementById("left").textContent = left;
  document.getElementById("meTotal").textContent = me;
  document.getElementById("heTotal").textContent = he;
  document.getElementById("balanceTotal").textContent = balanceTotal;
}

// 繪製清單
function render() {
  const m = getViewMonthKey();
  const list = rawData.filter(x => getMonthKey(x.date) === m)
    .sort((a,b) => new Date(b.date) - new Date(a.date));
  let html = "";
  list.forEach((x, i) => {
    const ds = new Date(x.date);
    const dateStr = `${ds.getMonth()+1}/${ds.getDate()}`;
    html += `
    <div class="item">
      <div>
        ${dateStr}｜<b>${x.shop}</b>
        <div class="cat">${x.cate}</div>
        我：${x.me}　他：${x.he}
      </div>
      <button class="del-btn" onclick="del(${i})">刪除</button>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
  cal();
}

// 刪除
function del(idx) {
  if(!confirm("確定刪除？")) return;
  const m = getViewMonthKey();
  const list = rawData.filter(x => getMonthKey(x.date) === m);
  const item = list[idx];
  rawData = rawData.filter(x =>
    !(x.date===item.date && x.shop===item.shop && x.cate===item.cate && x.me===item.me && x.he===item.he)
  );
  localStorage.setItem(STORAGE_KEY, JSON.stringify(rawData));
  render();
}

// 付款按鈕切換
const payBtns = document.querySelectorAll(".pay-btn");
payBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    payBtns.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    payType = btn.dataset.type;

    if (payType === "split") {
      document.getElementById("singleArea").style.display = "none";
      document.getElementById("splitArea").style.display = "flex";
    } else {
      document.getElementById("singleArea").style.display = "block";
      document.getElementById("splitArea").style.display = "none";
    }
  });
});

// 新增紀錄
function add() {
  const date = document.getElementById("datePick").value;
  const shop = document.getElementById("shop").value.trim();
  const cate = document.getElementById("cate").value;
  let me=0, he=0;

  if(!date) return alert("請選日期");
  if(!shop) return alert("請填店家");

  if(payType === "oneMe"){
    me = +document.getElementById("singleAmt").value || 0;
  }else if(payType === "oneHe"){
    he = +document.getElementById("singleAmt").value || 0;
  }else{
    me = +document.getElementById("amtMe").value || 0;
    he = +document.getElementById("amtHe").value || 0;
  }

  if(me + he === 0) return alert("金額不可為0");

  rawData.push({date, shop, cate, me, he});
  localStorage.setItem(STORAGE_KEY, JSON.stringify(rawData));

  document.getElementById("shop").value = "";
  document.getElementById("singleAmt").value = "";
  document.getElementById("amtMe").value = "";
  document.getElementById("amtHe").value = "";
  render();
}

// 匯出 CSV
function exportCSV() {
  const header = "日期,店家,分類,我出,他出,總計\n";
  const rows = rawData.map(x => `${x.date},${x.shop},${x.cate},${x.me},${x.he},${x.me+x.he}`);
  const blob = new Blob([header + rows.join("\n")], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="養豬週記_"+new Date().toISOString().slice(0,10)+".csv";
  a.click();
  URL.revokeObjectURL(url);
}

// 換月結算
function manualResetMonth() {
  const m = getViewMonthKey();
  const list = rawData.filter(x => getMonthKey(x.date) === m);
  let total=0;
  list.forEach(x => total += x.me + x.he);
  const left = 12000 - total;
  balanceTotal += left;
  localStorage.setItem(BALANCE_KEY, balanceTotal);
  alert("✅ 換月結算完成！\n本月剩餘："+left+" 元已加入節日基金\n🎁 目前累積："+balanceTotal+" 元");
  cal();
}

// 初始化
updateMonthLabel();
</script>
</body>
</html>
