<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐽 養豬日記</title>
<style>
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system;background:#fff9f9;margin:0;padding:16px;color:#222}
.card{background:white;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px8px #f0dce5}
h2{margin-top:4px;color:#c75d77}
.label{font-size:14px;color:#666;margin-top:8px}
input,select,button{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;margin-top:4px;font-size:16px}

input[type="date"] {width:100%!important;max-width:100%!important;box-sizing:border-box!important;appearance:none;}
button{background:#f06d8a;color:white;font-weight:bold;border:none}
.gray-btn{background:#eee;color:#333}

.del-btn{
  background:#ff9f9f;color:#fff;border:0;border-radius:6px;padding:2px4px;font-size:10px;
  writing-mode:horizontal-tb;text-orientation:upright;height:24px;width:auto;min-width:36px;
}

.split{display:flex;gap:8px}
.split input{flex:1}

.pay-row{display:flex;gap:8px;margin-top:4px}
.pay-btn{flex:1;padding:10px;border-radius:10px;border:1px solid #ddd;background:#f9f9f9;color:#333}
.pay-btn.active{background:#f06d8a;color:white}

.month-nav{display:flex;align-items:center;justify-content:center;gap:8px;margin:8px0}
.month-arrow{background:#f06d8a;color:white;border:none;border-radius:8px;padding:6px10px;font-size:14px;width:auto;min-width:36px;}
.month-text{font-size:17px;font-weight:600;color:#c75d77}

.total{font-size:17px;font-weight:600;margin:4px0}
.highlight{color:#f06d8a}
.balance{font-size:18px;font-weight:700;color:#e05686}
.item{padding:10px0;border-bottom:1px solid #f0f0f0;font-size:15px;display:flex;align-items:center;justify-content:space-between;}
.cat{color:#888;font-size:13px}
.gray{color:#555}
</style>
</head>
<body>

<div class="card">
  <h2>🐽 養豬日記</h2>
  <div class="month-nav">
    <button class="month-arrow" onclick="prevMonth()">＜</button>
    <div id="monthLabel" class="month-text">2026-04</div>
    <button class="month-arrow" onclick="nextMonth()">＞</button>
  </div>

  <div class="total">本月預算：<span class="highlight">12,000</span> 元</div>
  <div class="total">該月花費：<span id="total" class="highlight">0</span> 元</div>
  <div class="total">該月剩餘：<span id="left" class="highlight">12000</span> 元</div>

  <div style="margin-top:12px;padding-top:12px;border-top:1px solid #f0dce5">
    <div class="balance">🐖 結餘累計撲滿：<span id="balanceTotal">0</span> 元</div>
    <div style="font-size:14px;color:#666">每月結餘累積，節日超支可抵用</div>
  </div>

  <div style="margin-top:12px;font-size:15px">
    <div class="gray">我總付：<span id="meTotal">0</span> 元</div>
    <div class="gray">他總付：<span id="heTotal">0</span> 元</div>
  </div>
</div>

<div class="card">
  <div class="label">日期</div>
  <input id="datePick" type="date">

  <div class="label">店家 / 內容</div>
  <input id="shop" placeholder="ex：清河鵝肉 / 龜記">

  <div class="label">分類</div>
  <select id="cate">
    <option value="早餐">早餐</option>
    <option value="午餐">午餐</option>
    <option value="晚餐">晚餐</option>
    <option value="水">水</option>
    <option value="飲料">飲料</option>
    <option value="加油">加油</option>
    <option value="其他">其他</option>
  </select>

  <div class="label">付款方式</div>
  <div class="pay-row">
    <button class="pay-btn active" data-type="oneMe">我全付</button>
    <button class="pay-btn" data-type="oneHe">他全付</button>
    <button class="pay-btn" data-type="split">兩人分攤</button>
  </div>

  <div id="singleArea" style="margin-top:12px">
    <div class="label">金額</div>
    <input id="singleAmt" type="number" placeholder="輸入金額">
  </div>

  <div id="splitArea" style="display:none;margin-top:12px">
    <div class="label"></div>
    <div class="split">
      <input id="amtMe" placeholder="我出">
      <input id="amtHe" placeholder="他出">
    </div>
  </div>

  <button onclick="add()">新增記錄</button>
  <button class="gray-btn" onclick="exportCSV()">📤 匯出 CSV 備份</button>
  <button class="gray-btn" onclick="manualResetMonth()">🔄 換月結算（累積墊底）</button>
</div>

<div class="card">
  <h3>📝 記錄</h3>
  <div id="list"></div>
</div>

<script>
// 🔥 雲端同步 API (GitHub Pages 專用)
const API_URL = "https://api.npoint.io/37f189e12324412e2abc";

let rawData = [];
let balanceTotal = 0;
let payType = "oneMe";
let currentView = new Date();

// 自動更新
window.onload = () => { init(); setInterval(loadData, 2500); };

function init() {
  loadData();
  const d = new Date();
  document.getElementById("datePick").value = d.toISOString().slice(0,10);
  updateMonthLabel();
}

// 讀取同步資料
function loadData() {
  fetch(API_URL).then(r=>r.json()).then(r=>{
    rawData = r.records || [];
    balanceTotal = r.balance || 0;
    render();
  });
}

// 儲存同步資料
function saveData() {
  fetch(API_URL, {
    method: "POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ records: rawData, balance: balanceTotal })
  });
}

// 月份
function updateMonthLabel() {
  const y = currentView.getFullYear();
  const m = String(currentView.getMonth()+1).padStart(2,"0");
  document.getElementById("monthLabel").textContent = `${y}-${m}`;
  render();
}
function prevMonth() { currentView = new Date(currentView.getFullYear(), currentView.getMonth()-1,1); updateMonthLabel(); }
function nextMonth() { currentView = new Date(currentView.getFullYear(), currentView.getMonth()+1,1); updateMonthLabel(); }
function getViewMonthKey() { const y=currentView.getFullYear(); const m=String(currentView.getMonth()+1).padStart(2,"0"); return `${y}-${m}`; }
function getMonthKey(s) { const d=new Date(s); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; }

// 計算
function cal() {
  const m = getViewMonthKey();
  const list = rawData.filter(x=>getMonthKey(x.date)===m);
  let t=0,me=0,he=0; list.forEach(x=>{t+=x.me+x.he;me+=x.me;he+=x.he;});
  document.getElementById("total").textContent = t;
  document.getElementById("left").textContent = 12000 - t;
  document.getElementById("meTotal").textContent = me;
  document.getElementById("heTotal").textContent = he;
  document.getElementById("balanceTotal").textContent = balanceTotal;
}

// 畫面
function render() {
  const m = getViewMonthKey();
  const list = rawData.filter(x=>getMonthKey(x.date)===m).sort((a,b)=>new Date(b.date)-new Date(a.date));
  let html = "";
  list.forEach((x,i)=>{
    const ds = new Date(x.date);
    const dateStr = `${ds.getMonth()+1}/${ds.getDate()}`;
    html+=`<div class="item"><div>${dateStr}｜<b>${x.shop}</b><div class="cat">${x.cate}</div>我：${x.me}　他：${x.he}</div><button class="del-btn" onclick="del(${i})">刪除</button></div>`;
  });
  document.getElementById("list").innerHTML = html;
  cal();
}

// 刪除
function del(idx) {
  if(!confirm("確定刪除？")) return;
  const m = getViewMonthKey();
  const item = rawData.filter(x=>getMonthKey(x.date)===m)[idx];
  rawData = rawData.filter(x=>!(x.date===item.date&&x.shop===item.shop&&x.cate===item.cate&&x.me===item.me&&x.he===item.he));
  saveData(); render();
}

// 付款方式切換
document.querySelectorAll(".pay-btn").forEach(btn=>{
  btn.onclick = () => {
    document.querySelectorAll(".pay-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    payType = btn.dataset.type;
    document.getElementById("singleArea").style.display = payType==="split"?"none":"block";
    document.getElementById("splitArea").style.display = payType==="split"?"flex":"none";
  };
});

// 新增
function add() {
  const date = document.getElementById("datePick").value;
  const shop = document.getElementById("shop").value.trim();
  const cate = document.getElementById("cate").value;
  let me=0,he=0;
  if(!date||!shop){alert("請填完整");return;}
  if(payType==="oneMe") me=+document.getElementById("singleAmt").value||0;
  else if(payType==="oneHe") he=+document.getElementById("singleAmt").value||0;
  else{ me=+document.getElementById("amtMe").value||0; he=+document.getElementById("amtHe").value||0; }
  if(me+he===0){alert("金額不可為0");return;}
  rawData.push({date,shop,cate,me,he});
  saveData(); render();
  document.getElementById("shop").value="";
  document.getElementById("singleAmt").value="";
  document.getElementById("amtMe").value="";
  document.getElementById("amtHe").value="";
}

// 匯出
function exportCSV() {
  const header = "日期,店家,分類,我出,他出,總計\n";
  const rows = rawData.map(x=>`${x.date},${x.shop},${x.cate},${x.me},${x.he},${x.me+x.he}`);
  const blob = new Blob([header+rows.join("\n")],{type:"text/csv"});
  const a = document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="養豬日記_"+new Date().toISOString().slice(0,10)+".csv";
  a.click();
}

// 結算
function manualResetMonth() {
  const m = getViewMonthKey();
  const list = rawData.filter(x=>getMonthKey(x.date)===m);
  let total=0; list.forEach(x=>total+=x.me+x.he);
  const left = 12000 - total;
  balanceTotal += left;
  alert("✅ 換月結算！\n本月結餘："+left+" 元已累積至結餘累計撲滿\n🐖 目前累積："+balanceTotal+" 元");
  saveData(); render();
}
</script>
</body>
</html>
