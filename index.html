<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐽 養豬日記</title>
<style>
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system;background:#fff9f9;margin:0;padding:16px;color:#222}
.card{background:white;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px #f0dce5}
h2{margin-top:4px;color:#c75d77}
.label{font-size:14px;color:#666;margin-top:8px}
input,select,button{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;margin-top:4px;font-size:16px}

input[type="date"] {
  width:100%!important;
  max-width:100%!important;
  box-sizing:border-box!important;
  appearance:none;
}

button{background:#f06d8a;color:white;font-weight:bold;border:none}
.gray-btn{background:#eee;color:#333}

.del-btn{
  background:#ff9f9f;
  color:#fff;
  border:0;
  border-radius:6px;
  padding:2px 4px;
  font-size:10px;
  writing-mode:horizontal-tb;
  text-orientation:upright;
  height:24px;
  width:auto;
  min-width:36px;
}

.split{display:flex;gap:8px}
.split input{flex:1}

.pay-row{display:flex;gap:8px;margin-top:4px}
.pay-btn{flex:1;padding:10px;border-radius:10px;border:1px solid #ddd;background:#f9f9f9;color:#333}
.pay-btn.active{background:#f06d8a;color:white}

.month-nav{display:flex;align-items:center;justify-content:center;gap:8px;margin:8px 0}
.month-arrow{
  background:#f06d8a;
  color:white;
  border:none;
  border-radius:8px;
  padding:6px 10px;
  font-size:14px;
  width:auto;
  min-width:36px;
}
.month-text{font-size:17px;font-weight:600;color:#c75d77}

.total{font-size:17px;font-weight:600;margin:4px 0}
.highlight{color:#f06d8a}
.balance{font-size:18px;font-weight:700;color:#e05686}
.item{
  padding:10px 0;
  border-bottom:1px solid #f0f0f0;
  font-size:15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.cat{color:#888;font-size:13px}
.gray{color:#555}

.cate-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:8px;
}
.cate-btn{
  flex:1;
  min-width:70px;
  padding:10px;
  border:1px solid #ddd;
  border-radius:10px;
  color:#333;
  background:#f9f9f9;
  font-size:14px;
}
.cate-btn.active{
  background:#f06d8a;
  color:#fff;
  border-color:#f06d8a;
}
</style>
</head>
<body>

<div class="card">
  <h2>🐽 養豬日記</h2>

  <div class="month-nav">
    <button class="month-arrow" onclick="prevMonth()">＜</button>
    <div id="monthLabel" class="month-text">2026-04</div>
    <button class="month-arrow" onclick="nextMonth()">＞</button>
  </div>

  <div class="total">本月預算：<span class="highlight">12000</span> 元</div>
  <div class="total">該月花費：<span id="total" class="highlight">0</span> 元</div>
  <div class="total">該月剩餘：<span id="left" class="highlight">12000</span> 元</div>

  <div style="margin-top:12px;padding-top:12px;border-top:1px solid #f0dce5">
    <div class="balance">🐖 結餘累計撲滿：<span id="balanceTotal">0</span> 元</div>
    <div style="font-size:14px;color:#666">每月結餘累積，節日超支可抵用</div>
  </div>

  <div style="margin-top:12px;font-size:15px">
    <div class="gray">我總付：<span id="meTotal">0</span> 元</div>
    <div class="gray">他總付：<span id="heTotal">0</span> 元</div>
  </div>
</div>

<div class="card">
  <div class="label">日期</div>
  <input id="datePick" type="date">

  <div class="label">店家 / 內容</div>
  <input id="shop" placeholder="ex：清河鵝肉 / 龜記">

  <div class="label">分類</div>
  <div class="cate-row">
    <button class="cate-btn" data-cate="早餐">早餐</button>
    <button class="cate-btn" data-cate="午餐">午餐</button>
    <button class="cate-btn" data-cate="晚餐">晚餐</button>
    <button class="cate-btn" data-cate="點心">點心</button>
    <button class="cate-btn" data-cate="飲料">飲料</button>
    <button class="cate-btn" data-cate="水">水</button>
    <button class="cate-btn" data-cate="加油">加油</button>
    <button class="cate-btn" data-cate="其他">其他</button>
  </div>

 <div style="margin-top:12px">
  <div class="split">
    <input id="amtMe" placeholder="我出">
    <input id="amtHe" placeholder="他出">
  </div>
</div>

  <button onclick="add()">新增記錄</button>
  <button class="gray-btn" onclick="exportCSV()" style="margin-top:8px">📤 匯出 CSV</button>
  <button class="gray-btn" onclick="manualResetMonth()" style="margin-top:4px">🔄 換月結算</button>
  <button class="gray-btn" onclick="recalculateBalance()" style="margin-top:4px;background:#4caf50">🧮 重新計算正確撲滿</button>
</div>

<div class="card">
  <h3>📝 記錄</h3>
  <div id="list"></div>
</div>

<script>
const STORAGE_KEY = "ourPigLog";
const BALANCE_KEY = "pigBalanceTotal";
const MONTHLY_BUDGET = 12000;

let rawData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let balanceTotal = +localStorage.getItem(BALANCE_KEY) || 0;
let payType = "oneMe";
let currentCate = "早餐";
let currentView = new Date();

// 日期初始化
const datePick = document.getElementById("datePick");
datePick.valueAsDate = new Date();

// 分類按鈕
const cateBtns = document.querySelectorAll(".cate-btn");
cateBtns[0].classList.add("active");
cateBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    cateBtns.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentCate = btn.dataset.cate;
  });
});

// 月份標籤
function updateMonthLabel() {
  const y = currentView.getFullYear();
  const m = String(currentView.getMonth() + 1).padStart(2, '0');
  document.getElementById("monthLabel").textContent = `${y}-${m}`;
  render();
}

function prevMonth() {
  currentView = new Date(currentView.getFullYear(), currentView.getMonth() - 1, 1);
  updateMonthLabel();
}
function nextMonth() {
  currentView = new Date(currentView.getFullYear(), currentView.getMonth() + 1, 1);
  updateMonthLabel();
}

function getViewMonthKey() {
  const y = currentView.getFullYear();
  const m = String(currentView.getMonth() + 1).padStart(2, '0');
  return `${y}-${m}`;
}
function getMonthKey(dateStr) {
  return dateStr.slice(0,7);
}

// 計算數字
function cal() {
  const m = getViewMonthKey();
  const list = rawData.filter(x => getMonthKey(x.date) === m);
  let total=0, me=0, he=0;
  list.forEach(x => {
    total += x.me + x.he;
    me += x.me;
    he += x.he;
  });
  document.getElementById("total").textContent = total;
  document.getElementById("left").textContent = MONTHLY_BUDGET - total;
  document.getElementById("meTotal").textContent = me;
  document.getElementById("heTotal").textContent = he;
  document.getElementById("balanceTotal").textContent = balanceTotal;
}

// 畫面顯示
function render() {
  const m = getViewMonthKey();
  const list = rawData.filter(x => getMonthKey(x.date) === m);
  let html = "";
  list.forEach((x, idx) => {
    const d = new Date(x.date);
    const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
    html += `
    <div class="item">
      <div>
        ${dateStr}｜<b>${x.shop}</b>
        <div class="cat">${x.cate}</div>
        我：${x.me}　他：${x.he}
      </div>
      <button class="del-btn" onclick="del(${idx})">刪除</button>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
  cal();
}

// 刪除（正確版）
function del(idx) {
  if(!confirm("確定刪除？")) return;
  const m = getViewMonthKey();
  const currentList = rawData.filter(x => getMonthKey(x.date) === m);
  const target = currentList[idx];
  const realIndex = rawData.findIndex(x => 
    x.date === target.date && x.shop === target.shop && x.cate === target.cate && x.me === target.me && x.he === target.he
  );
  if(realIndex !== -1) rawData.splice(realIndex, 1);
  saveAll();
}

function add() {
  const date = datePick.value;
  const shop = document.getElementById("shop").value.trim();
  const cate = currentCate;

  let me = +document.getElementById("amtMe").value || 0;
  let he = +document.getElementById("amtHe").value || 0;

  if (!date || !shop) {
    alert("請填完整");
    return;
  }
  if (me + he === 0) {
    alert("金額不可為0");
    return;
  }

  rawData.push({ date, shop, cate, me, he });
  saveAll();

  document.getElementById("shop").value = "";
  document.getElementById("amtMe").value = "";
  document.getElementById("amtHe").value = "";
}

// 存檔
function saveAll() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(rawData));
  localStorage.setItem(BALANCE_KEY, balanceTotal);
  render();
}

// 結算（防重複）
function manualResetMonth() {
  if (!confirm("確定結算這個月？每月只可一次")) return;
  const m = getViewMonthKey();
  let settled = JSON.parse(localStorage.getItem("settledMonths")) || [];
  if (settled.includes(m)) {
    alert("已結算過");
    return;
  }
  const list = rawData.filter(x => getMonthKey(x.date) === m);
  let total = 0;
  list.forEach(x => total += x.me + x.he);
  const left = MONTHLY_BUDGET - total;
  balanceTotal += left;
  settled.push(m);
  localStorage.setItem("settledMonths", JSON.stringify(settled));
  alert("結算完成！本月結餘："+left);
  saveAll();
}

// 🔥 全盘重新计算累计结余（依据所有明细，可无限次使用）
function recalculateBalance() {
  if (!confirm('確定要依「所有明細」重新計算正確累計結餘嗎？')) return;

  // 1. 先歸零
  balanceTotal = 0;

  // 2. 取出所有已經結算過的月份
  let settledMonths = JSON.parse(localStorage.getItem("settledMonths")) || [];

  // 3. 每個月重新計算剩餘，再加總成撲滿
  settledMonths.forEach(m => {
    const monthTotal = rawData
      .filter(x => getMonthKey(x.date) === m)
      .reduce((sum, item) => sum + item.me + item.he, 0);

    const left = 12000 - monthTotal;
    if (left > 0) {
      balanceTotal += left;
    }
  });

  // 4. 存回正確值
  saveAll();
  alert("✅ 已依明細重新計算完畢！\n累計結餘已還原為正確數字");
}


// 匯出
function exportCSV() {
  const header = "日期,店家,分類,我出,他出,總計\n";
  const rows = rawData.map(x => `${x.date},${x.shop},${x.cate},${x.me},${x.he},${x.me+x.he}`);
  const blob = new Blob([header + rows.join("\n")], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "養豬日記.csv";
  a.click();
}

updateMonthLabel();
</script>
</body>
</html>
